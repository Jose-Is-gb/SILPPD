<!--
==========================================================================
VIEW: 403.html
DESCRIPTION: Página de Acceso Denegado (403 Forbidden) para SILPPD.
  Se muestra cuando un usuario autenticado intenta acceder a un recurso
  para el cual no tiene permisos (rol incorrecto).
ACCESIBILITY:
  - WCAG 2.1 AA Compliant
  - Semántica HTML5 nativa (header, main, footer)
  - Etiquetas ARIA y atributos de accesibilidad
==========================================================================
-->

<!DOCTYPE html>
<html lang="es">

<head>
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://www.gstatic.com https://www.google.com https://firestore.googleapis.com https://firebasestorage.googleapis.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com;
    img-src 'self' data: https:;
    style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://fonts.googleapis.com https://www.gstatic.com;
    font-src 'self' https://cdnjs.cloudflare.com https://fonts.gstatic.com;
    script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://www.gstatic.com https://www.google.com;
    frame-src https://www.google.com https://www.gstatic.com https://silppd-4e248.firebaseapp.com;
    connect-src 'self' https://firestore.googleapis.com https://firebasestorage.googleapis.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://www.googleapis.com https://firebase.googleapis.com;
  ">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acceso Denegado - Talento Inclusivo</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Iconos -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <!-- CSS de accesibilidad -->
  <link rel="stylesheet" href="utils/accessibility.css">

  <style>
    body {
      background-color: #1976d2 !important;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      margin: 0;
    }

    .forbidden-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .forbidden-card {
      border-radius: 18px;
      max-width: 560px;
      width: 100%;
      animation: fadeInUp 0.5s ease-out;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .forbidden-icon {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ff5252, #d32f2f);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      box-shadow: 0 8px 25px rgba(211, 47, 47, 0.35);
    }

    .forbidden-icon i {
      font-size: 2.5rem;
      color: white;
    }

    .error-code {
      font-size: 4rem;
      font-weight: 800;
      color: #d32f2f;
      line-height: 1;
      margin-bottom: 0.25rem;
    }

    .error-title {
      font-size: 1.4rem;
      font-weight: 700;
      color: #333;
    }

    .error-description {
      color: #666;
      font-size: 0.95rem;
      line-height: 1.6;
    }

    .user-info-box {
      background-color: #fff3e0;
      border-left: 4px solid #ff9800;
      border-radius: 8px;
      padding: 0.85rem 1rem;
    }

    .user-info-box i {
      color: #ff9800;
    }

    .btn-back {
      background: linear-gradient(135deg, #1976d2, #1565c0);
      border: none;
      border-radius: 12px;
      padding: 0.65rem 1.8rem;
      font-weight: 600;
      color: white;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(25, 118, 210, 0.3);
    }

    .btn-back:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(25, 118, 210, 0.4);
      color: white;
    }

    .btn-logout {
      background: transparent;
      border: 2px solid #d32f2f;
      border-radius: 12px;
      padding: 0.65rem 1.8rem;
      font-weight: 600;
      color: #d32f2f;
      transition: all 0.3s ease;
    }

    .btn-logout:hover {
      background-color: #d32f2f;
      color: white;
      transform: translateY(-2px);
    }

    footer {
      flex-shrink: 0;
    }

    /* Responsivo */
    @media (max-width: 576px) {
      .forbidden-wrapper {
        padding: 1rem 0.5rem;
      }

      .forbidden-card {
        padding: 1.25rem !important;
      }

      .error-code {
        font-size: 3rem;
      }

      .forbidden-icon {
        width: 70px;
        height: 70px;
      }

      .forbidden-icon i {
        font-size: 2rem;
      }
    }
  </style>
</head>

<body>

  <!-- CONTENIDO PRINCIPAL -->
  <main class="forbidden-wrapper" role="main">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">

          <div class="card shadow-lg forbidden-card p-4 p-md-5 text-center" role="alert" aria-live="assertive">

            <!-- Icono -->
            <div class="forbidden-icon" aria-hidden="true">
              <i class="fa-solid fa-shield-halved"></i>
            </div>

            <!-- Código de error -->
            <div class="error-code" aria-label="Error 403">403</div>
            <h1 class="error-title mb-3">Acceso Denegado</h1>

            <p class="error-description mb-4">
              No tienes los permisos necesarios para acceder a este recurso.
              Tu cuenta no posee el rol requerido para visualizar esta sección.
            </p>

            <!-- Info del usuario autenticado -->
            <div class="user-info-box mb-4 text-start" id="userInfoBox">
              <div class="d-flex align-items-center">
                <i class="fa-solid fa-circle-info me-2 fs-5" aria-hidden="true"></i>
                <div>
                  <small class="text-muted">Has iniciado sesión como:</small><br>
                  <strong id="userDisplayName">Cargando...</strong>
                  <span class="badge bg-secondary ms-2" id="userRoleBadge">—</span>
                </div>
              </div>
            </div>

            <!-- Acciones -->
            <div class="d-flex flex-column flex-sm-row justify-content-center gap-3">
              <button class="btn btn-back" id="btnGoHome" aria-label="Volver a mi área">
                <i class="fa-solid fa-arrow-left me-2"></i>Ir a mi área
              </button>
              <button class="btn btn-logout" id="btnLogout403" aria-label="Cerrar sesión">
                <i class="fa-solid fa-right-from-bracket me-2"></i>Cerrar sesión
              </button>
            </div>

          </div>

        </div>
      </div>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="text-center text-light py-3">
    © 2025 Talento Inclusivo. Construyendo un futuro laboral más inclusivo.
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

  <!-- Firebase (necesario para leer sesión y cerrar sesión) -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js" integrity="sha384-yuGdyIzzYtOBlBG6JOWn+Ey9kpq7HocusNuxEGyyohr1eEyXpeEyehIIXC/hznw4" crossorigin="anonymous"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js" integrity="sha384-nwX2Qpkhc2sv6L0ZPkLefLGguao67toSowvePuQvGF6cG+8MUphGI2uI94Ls3JF7" crossorigin="anonymous"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js" integrity="sha384-lI+CxEx/bCvWP1b0OK13j5HTrTZP7yf1xle8TVOFq2smz6KC1RChTarRV/RHP5PP" crossorigin="anonymous"></script>
  <script src="BD/firebase-config.js"></script>
  <script src="BD/auth.js"></script>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const nameEl = document.getElementById("userDisplayName");
      const badgeEl = document.getElementById("userRoleBadge");
      const btnHome = document.getElementById("btnGoHome");
      const btnLogout = document.getElementById("btnLogout403");

      // Mapa de roles a sus páginas de inicio y etiquetas legibles
      const roleMap = {
        usuario: { label: "Usuario", home: "User/user_home.html", color: "bg-primary" },
        empresa: { label: "Empresa", home: "Empresa/dashboard.html", color: "bg-warning text-dark" },
        admin:   { label: "Administrador", home: "Admin/admin.html", color: "bg-success" }
      };

      // Leer sesión activa del localStorage (cache rápido)
      const cached = Auth.getActiveUser();
      if (cached && cached.nombre && cached.rol) {
        nameEl.textContent = cached.nombre + " (" + cached.correo + ")";
        const info = roleMap[cached.rol] || { label: cached.rol, home: "login.html", color: "bg-secondary" };
        badgeEl.textContent = info.label;
        badgeEl.className = "badge ms-2 " + info.color;

        btnHome.addEventListener("click", () => {
          // Detectar si estamos en la raíz o dentro de un subdirectorio
          const basePath = window.location.pathname.includes("/403.html") ? "" : "../";
          window.location.href = basePath + info.home;
        });
      } else {
        // Si no hay caché, no debería estar aquí — redirigir al login
        nameEl.textContent = "Sesión no encontrada";
        badgeEl.textContent = "Sin sesión";
        btnHome.textContent = "Ir al Login";
        btnHome.addEventListener("click", () => {
          window.location.href = "login.html";
        });
      }

      // Botón cerrar sesión
      btnLogout.addEventListener("click", async () => {
        try {
          await authFirebase.signOut();
        } catch (e) {
          console.error("Error al cerrar sesión:", e);
        }
        localStorage.removeItem("activeUser");
        window.location.href = "login.html";
      });
    });
  </script>

  <script src="utils/accessibility.js" defer></script>
</body>

</html>
