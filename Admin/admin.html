<!DOCTYPE html>
<html lang="es">
<head>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://www.gstatic.com https://firestore.googleapis.com https://firebasestorage.googleapis.com https://identitytoolkit.googleapis.com; img-src 'self' data: https://cdn-icons-png.flaticon.com https://firebasestorage.googleapis.com https://lh3.googleusercontent.com; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://fonts.googleapis.com; font-src 'self' https://cdnjs.cloudflare.com https://fonts.gstatic.com; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://www.gstatic.com;">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Administrativo - Talento Inclusivo</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YcnS/1p0IFXB6kiqOOoMhDEq0SMRKyA2DP7H" crossorigin="anonymous">

    <!-- Iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha384-t1nt8BQoYMLFN5p42tRAtuAAFQaCgkVDyWBSJJoSOrSvnfmwAJfo0W/FBFHaGPBR" crossorigin="anonymous">

    <!-- Estilos propios -->
    <link rel="stylesheet" href="admin.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.4.0/purify.min.js" integrity="sha384-jo2dKNtkiHrxz1QPbtuID2FGqP9smXxt1yTdRbkMeiG2zWMACmBah43xTKOoguN/" crossorigin="anonymous"></script>
  <script src="../utils/security.js"></script>
  <link rel="stylesheet" href="../utils/accessibility.css">
</head>
<body>

    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="sidebar-header text-center pt-4 pb-3">
            <div class="d-inline-flex align-items-center justify-content-center bg-white text-primary rounded-circle shadow-sm mb-3" style="width: 55px; height: 55px;">
                <i class="fa fa-shield-halved fa-2x"></i>
            </div>
            <h5 class="text-white fw-bold mb-1" style="letter-spacing: 1px;">ADMINISTRADOR</h5>
            <p class="text-white-50 small mb-0">Talento Inclusivo</p>
            <hr class="border-white opacity-25 mt-4 mx-3">
        </div>

        <ul class="sidebar-menu">
            <li class="active"><i class="fa fa-chart-line"></i> Dashboard</li>
            <li onclick="location.href='usuario.html'"><i class="fa fa-users"></i> Usuarios</li>
            <li onclick="location.href='gestion.html'"><i class="fa fa-briefcase"></i> Ofertas</li>
            <li onclick="location.href='validacion_empresas.html'"><i class="fa fa-clipboard-check"></i> Validación</li>
            <li onclick="location.href='mensajes.html'"><i class="fa fa-envelope"></i> Mensajes</li>
            <li onclick="location.href='reporte.html'"><i class="fa fa-chart-pie"></i> Reportes</li>
            <li onclick="location.href='config_admin.html'"><i class="fa fa-gear"></i> Configuración</li>
            <li id="logoutBtn" class="logout" onclick="Auth.logout()" style="cursor:pointer;"><i class="fa fa-right-from-bracket"></i> Salir</li>
        </ul>
    </div>

    <!-- CONTENIDO PRINCIPAL -->
    <div class="main-content">

        <!-- TOPBAR -->
        
<!-- Sección Estructural: NAV de la Página -->
<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm px-4">
            <div class="container-fluid">
                <span class="navbar-brand fw-bold text-primary">Panel de Administración</span>
                <div class="ms-auto d-flex align-items-center">
                    <span class="me-3 fw-semibold">Administrador</span>
                    <i class="fa fa-user-circle fa-2x text-primary"></i>
                </div>
            </div>
        </nav>

        <!-- CONTENIDO -->
        <div class="container mt-5">

            <!-- TARJETAS DE RESUMEN -->
            <div class="row g-4 mb-5">
                <!-- Columna del sistema de rejilla Bootstrap -->
                <div class="col-md-3">
                    <div class="dashboard-card shadow-sm text-center">
                        <i class="fa fa-users icon text-primary mb-2"></i>
                        <h6>Total Usuarios</h6>
                        <p id="countUsuarios" class="value fs-4 fw-bold">0</p>
                    </div>
                </div>

                <!-- Columna del sistema de rejilla Bootstrap -->
                <div class="col-md-3">
                    <div class="dashboard-card shadow-sm text-center">
                        <i class="fa fa-briefcase icon text-success mb-2"></i>
                        <h6>Ofertas Activas</h6>
                        <p id="countOfertas" class="value fs-4 fw-bold">0</p>
                    </div>
                </div>

                <!-- Columna del sistema de rejilla Bootstrap -->
                <div class="col-md-3">
                    <div class="dashboard-card shadow-sm text-center">
                        <i class="fa fa-building icon text-info mb-2"></i>
                        <h6>Empresas</h6>
                        <p id="countEmpresas" class="value fs-4 fw-bold">0</p>
                    </div>
                </div>

                <!-- Columna del sistema de rejilla Bootstrap -->
                <div class="col-md-3">
                    <div class="dashboard-card shadow-sm text-center">
                        <i class="fa fa-check icon text-warning mb-2"></i>
                        <h6>Postulaciones</h6>
                        <p id="countPostulaciones" class="value fs-4 fw-bold">0</p>
                    </div>
                </div>
            </div>

            <!-- ACTIVIDAD RECIENTE -->
            <div class="card shadow p-4 rounded-3">
                <h5 class="fw-bold mb-3">
                    <i class="fa fa-clock text-primary me-2"></i>Actividad Reciente
                </h5>

                <ul id="actividadReciente" class="list-group list-group-flush">
                    <li class="list-group-item text-muted">Cargando actividad...</li>
                </ul>
            </div>

        </div>
    </div>

    <!-- SCRIPTS -->
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

    <!-- SCRIPTS DE FIREBASE (Modo Compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js" integrity="sha384-yuGdyIzzYtOBlBG6JOWn+Ey9kpq7HocusNuxEGyyohr1eEyXpeEyehIIXC/hznw4" crossorigin="anonymous"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js" integrity="sha384-nwX2Qpkhc2sv6L0ZPkLefLGguao67toSowvePuQvGF6cG+8MUphGI2uI94Ls3JF7" crossorigin="anonymous"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js" integrity="sha384-lI+CxEx/bCvWP1b0OK13j5HTrTZP7yf1xle8TVOFq2smz6KC1RChTarRV/RHP5PP" crossorigin="anonymous"></script>
    <script src="../BD/firebase-config.js"></script>

    <script src="../BD/data.js"></script>
    <script src="../init_data.js"></script>
    <script src="../BD/auth.js"></script>
    <script src="admin.js"></script>

  <script src="../utils/accessibility.js" defer></script>
</body>
</html>
