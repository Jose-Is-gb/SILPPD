<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuración del Sistema - Talento Inclusivo</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- CSS propio -->
    <link rel="stylesheet" href="config_admin.css">
</head>

<body>

    <div class="d-flex">

        <!-- SIDEBAR -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h3>Admin</h3>
                <p class="text-muted small">Talento Inclusivo</p>
            </div>

            <ul class="sidebar-menu">
                <li onclick="location.href='admin.html'"><i class="fa fa-chart-line"></i> Dashboard</li>
                <li onclick="location.href='usuario.html'"><i class="fa fa-users"></i> Usuarios</li>
                <li onclick="location.href='gestion.html'"><i class="fa fa-briefcase"></i> Ofertas</li>
                <li onclick="location.href='validacion_empresas.html'"><i class="fa fa-building"></i> Empresas</li>
                <li onclick="location.href='reporte.html'"><i class="fa fa-chart-pie"></i> Reportes</li>
                <li class="active"><i class="fa fa-gear"></i> Configuración</li>
                <li id="logoutBtn" class="logout"><i class="fa fa-right-from-bracket"></i> Salir</li>
            </ul>
        </div>

        <!-- CONTENIDO PRINCIPAL -->
        <div class="main-content">

            <!-- TOPBAR -->
            <nav class="navbar navbar-expand-lg bg-white shadow-sm px-4">
                <div class="container-fluid">
                    <span class="navbar-brand fw-bold text-primary">Configuración del Sistema</span>
                    <div class="ms-auto d-flex align-items-center">
                        <span class="me-3 fw-semibold">Administrador</span>
                        <i class="fa fa-user-circle fa-2x text-primary"></i>
                    </div>
                </div>
            </nav>

            <!-- CONTENIDO -->
            <div class="container-fluid mt-4">

                <div class="card p-4 shadow rounded-3">

                    <h5 class="fw-bold mb-4">Preferencias Generales</h5>

                    <div class="row g-4">

                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Nombre de la Plataforma</label>
                            <input id="nombreSistema" class="form-control" placeholder="Ej: Talento Inclusivo">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Correo del Administrador</label>
                            <input id="correoAdmin" class="form-control" placeholder="admin@correo.com">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Permitir nuevos registros</label>
                            <select id="permitirRegistros" class="form-select">
                                <option value="si">Sí</option>
                                <option value="no">No</option>
                            </select>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Compatibilidad automática según discapacidad</label>
                            <select id="compatibilidadAuto" class="form-select">
                                <option value="si">Activada</option>
                                <option value="no">Desactivada</option>
                            </select>
                        </div>

                        <hr class="mt-4">

                        <div class="col-12">
                            <label class="form-label fw-semibold">Logo del Sistema</label>
                            <input id="logoSistema" type="file" accept="image/*" class="form-control">
                            <small class="text-muted">Se recomienda 300x100px – PNG o SVG.</small>

                            <div class="mt-3">
                                <img id="previewLogo" src="" class="img-fluid" style="max-height: 80px;">
                            </div>
                        </div>

                    </div>

                    <div class="mt-4 text-end">
                        <button id="guardarConfig" class="btn btn-primary px-4">
                            <i class="fa fa-save"></i> Guardar configuración
                        </button>
                    </div>

                </div>

            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../init_data.js"></script>
    <script src="../BD/data.js"></script>
    <script src="../BD/auth.js"></script>
    <script src="config_admin.js"></script>

</body>
</html>
