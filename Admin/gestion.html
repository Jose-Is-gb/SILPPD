<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Ofertas - Talento Inclusivo</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- CSS propio -->
    <link rel="stylesheet" href="gestion.css">

</head>
<body>

    <div class="d-flex">

        <!-- SIDEBAR -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h3>Admin</h3>
                <p class="text-muted small">Talento Inclusivo</p>
            </div>

            <ul class="sidebar-menu">
                <li onclick="location.href='admin.html'"><i class="fa fa-chart-line"></i> Dashboard</li>
                <li onclick="location.href='usuario.html'"><i class="fa fa-users"></i> Usuarios</li>
                <li class="active"><i class="fa fa-briefcase"></i> Ofertas</li>
                <li onclick="location.href='validacion_empresas.html'"><i class="fa fa-building"></i> Empresas</li>
                <li onclick="location.href='reporte.html'"><i class="fa fa-chart-pie"></i> Reportes</li>
                <li onclick="location.href='config_admin.html'"><i class="fa fa-gear"></i> Configuración</li>
                <li id="logoutBtn" class="logout"><i class="fa fa-right-from-bracket"></i> Salir</li>
            </ul>
        </div>

        <!-- CONTENIDO PRINCIPAL -->
        <div class="main-content">

            <!-- TOPBAR -->
            <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm px-4">
                <div class="container-fluid">
                    <span class="navbar-brand fw-bold text-primary">Gestión de Ofertas</span>
                    <div class="ms-auto d-flex align-items-center">
                        <span class="me-3 fw-semibold">Administrador</span>
                        <i class="fa fa-user-circle fa-2x text-primary"></i>
                    </div>
                </div>
            </nav>

            <div class="container-fluid mt-4">

                <div class="card shadow p-4 rounded-3">

                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h5 class="fw-bold">Listado de Ofertas</h5>
                        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalNuevaOferta">
                            <i class="fa fa-plus"></i> Nueva Oferta
                        </button>
                    </div>

                    <!-- FILTROS -->
                    <div class="row g-3 mb-4">

                        <div class="col-md-4">
                            <label class="form-label fw-bold">Buscar</label>
                            <input id="buscarOferta" type="text" class="form-control" placeholder="Puesto, empresa...">
                        </div>

                        <div class="col-md-4">
                            <label class="form-label fw-bold">Discapacidad compatible</label>
                            <select id="filtrarDiscapacidad" class="form-select">
                                <option value="all">Todas</option>
                                <option value="fisica">Física / Motora</option>
                                <option value="visual">Visual</option>
                                <option value="auditiva">Auditiva</option>
                                <option value="intelectual">Intelectual</option>
                                <option value="psicosocial">Psicosocial</option>
                            </select>
                        </div>

                        <div class="col-md-2 d-flex align-items-end">
                            <button id="btnFiltrar" class="btn btn-primary w-100"><i class="fa fa-filter"></i> Filtrar</button>
                        </div>

                        <div class="col-md-2 d-flex align-items-end">
                            <button id="btnLimpiar" class="btn btn-outline-secondary w-100">Limpiar</button>
                        </div>

                    </div>

                    <!-- TABLA -->
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>Puesto</th>
                                    <th>Empresa</th>
                                    <th>Ciudad</th>
                                    <th>Modalidad</th>
                                    <th>Discapacidad</th>
                                    <th>Estado</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="tablaOfertas">
                                <!-- Generado desde JS -->
                            </tbody>
                        </table>
                    </div>

                </div>

            </div>
          
        </div>

    </div>

    <!-- MODAL: Nueva Oferta -->
        <div class="modal fade" id="modalNuevaOferta" tabindex="-1">
            <div class="modal-dialog modal-lg">
                <div class="modal-content rounded-4">

                    <div class="modal-header bg-primary text-white">
                        <h5 class="modal-title">Crear Nueva Oferta</h5>
                        <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                    </div>

                    <div class="modal-body row g-3">

                        <div class="col-md-6">
                            <label class="form-label">Título del Puesto</label>
                            <input id="nuevoTitulo" class="form-control">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Empresa</label>
                            <input id="nuevaEmpresa" class="form-control">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Categoría</label>
                            <input id="nuevaCategoria" class="form-control" placeholder="Ej: Tecnología, Marketing, Administración">
                        </div>

                        <div class="col-12">
                            <label class="form-label">Descripción</label>
                            <textarea id="nuevaDescripcion" class="form-control" rows="3" placeholder="Detalle de la oferta"></textarea>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Ciudad</label>
                            <input id="nuevaCiudad" class="form-control">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Modalidad</label>
                            <select id="nuevaModalidad" class="form-select">
                                <option>Presencial</option>
                                <option>Híbrido</option>
                                <option>Remoto</option>
                            </select>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Discapacidad compatible</label>
                            <select id="nuevaDiscapacidad" class="form-select">
                                <option value="Fisica">Física</option>
                                <option value="Visual">Visual</option>
                                <option value="Auditiva">Auditiva</option>
                                <option value="Intelectual">Intelectual</option>
                                <option value="Psicosocial">Psicosocial</option>
                            </select>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Estado</label>
                            <select id="nuevoEstado" class="form-select">
                                <option>Activa</option>
                                <option>Pausada</option>
                            </select>
                        </div>

                    </div>

                    <div class="modal-footer">
                        <button id="guardarNuevaOferta" class="btn btn-success">Guardar</button>
                    </div>

                </div>
            </div>
        </div>


    <!-- SCRIPTS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../init_data.js"></script>
    <script src="../BD/data.js"></script>
    <script src="../BD/auth.js"></script>
    <script src="gestion.js"></script>

</body>
</html>
