<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reportes - Talento Inclusivo</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- CSS propio -->
    <link rel="stylesheet" href="reporte.css">
</head>

<body>

    <div class="d-flex">

        <!-- SIDEBAR -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h3>Admin</h3>
                <p class="text-muted small">Talento Inclusivo</p>
            </div>

            <ul class="sidebar-menu">
                <li onclick="location.href='admin.html'"><i class="fa fa-chart-line"></i> Dashboard</li>
                <li onclick="location.href='usuario.html'"><i class="fa fa-users"></i> Usuarios</li>
                <li onclick="location.href='gestion.html'"><i class="fa fa-briefcase"></i> Ofertas</li>
                <li onclick="location.href='validacion_empresas.html'"><i class="fa fa-building"></i> Empresas</li>
                <li class="active"><i class="fa fa-chart-pie"></i> Reportes</li>
                <li onclick="location.href='config_admin.html'"><i class="fa fa-gear"></i> Configuración</li>
                <li id="logoutBtn" class="logout"><i class="fa fa-right-from-bracket"></i> Salir</li>
            </ul>
        </div>

        <!-- CONTENIDO PRINCIPAL -->
        <div class="main-content">

            <!-- TOPBAR -->
            <nav class="navbar navbar-expand-lg bg-white shadow-sm px-4">
                <div class="container-fluid">
                    <span class="navbar-brand fw-bold text-primary">Reportes y Estadísticas</span>
                    <div class="ms-auto d-flex align-items-center">
                        <span class="me-3 fw-semibold">Administrador</span>
                        <i class="fa fa-user-circle fa-2x text-primary"></i>
                    </div>
                </div>
            </nav>

            <div class="container-fluid mt-4">

                <div class="row g-4">

                    <div class="card p-4 shadow rounded-3 text-center">
                        <h5 class="fw-bold mb-3">Usuarios por tipo de discapacidad</h5>
                        <canvas id="chartDiscapacidad"></canvas>
                    </div>


                    <!-- MODALIDAD DE OFERTAS -->
                    <div class="col-md-6">
                        <div class="card p-4 shadow rounded-3">
                            <h5 class="fw-bold mb-3">Modalidad de Ofertas</h5>
                            <canvas id="chartModalidad"></canvas>
                        </div>
                    </div>

                    <!-- COMPATIBILIDAD ACCESIBLE -->
                    <div class="col-md-6">
                        <div class="card p-4 shadow rounded-3">
                            <h5 class="fw-bold mb-3">Ofertas por compatibilidad</h5>
                            <canvas id="chartCompatibilidad"></canvas>
                        </div>
                    </div>

                    <!-- POSTULACIONES POR MES -->
                    <div class="col-md-6">
                        <div class="card p-4 shadow rounded-3">
                            <h5 class="fw-bold mb-3">Postulaciones por mes</h5>
                            <canvas id="chartPostulaciones"></canvas>
                        </div>
                    </div>

                </div>

            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../init_data.js"></script>
    <script src="../BD/data.js"></script>
    <script src="../BD/auth.js"></script>
    <script src="reporte.js"></script>

</body>
</html>
