<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administrar Usuarios - Talento Inclusivo</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="usuario.css">

</head>
<body>

    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="sidebar-header">
            <h3>Admin</h3>
            <p class="text-muted small">Talento Inclusivo</p>
        </div>

        <ul class="sidebar-menu">
            <li onclick="location.href='admin.html'"><i class="fa fa-chart-line"></i> Dashboard</li>
            <li class="active"><i class="fa fa-users"></i> Usuarios</li>
            <li onclick="location.href='gestion.html'"><i class="fa fa-briefcase"></i> Ofertas</li>
            <li onclick="location.href='validacion_empresas.html'"><i class="fa fa-building"></i> Empresas</li>
            <li onclick="location.href='reporte.html'"><i class="fa fa-chart-pie"></i> Reportes</li>
            <li onclick="location.href='config_admin.html'"><i class="fa fa-gear"></i> Configuración</li>
            <li id="logoutBtn" class="logout"><i class="fa fa-right-from-bracket"></i> Salir</li>
        </ul>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content">

        <!-- TOPBAR -->
        <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm px-4">
            <div class="container-fluid">
                <span class="navbar-brand fw-bold text-primary">Gestión de Usuarios</span>
                <div class="ms-auto d-flex align-items-center">
                    <span class="me-3 fw-semibold">Administrador</span>
                    <i class="fa fa-user-circle fa-2x text-primary"></i>
                </div>
            </div>
        </nav>

        <!-- CONTENIDO -->
        <div class="container-fluid mt-4">

            <div class="card shadow p-4 rounded-3">

            <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="fw-bold">Lista de Usuarios</h5>
            <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#modalAgregar">
                <i class="fa fa-plus"></i> Nuevo Usuario
            </button>
            </div>


                <!-- FILTROS -->
                <div class="row g-3 mb-4">

                    <div class="col-md-4">
                        <label class="form-label fw-bold">Buscar usuario</label>
                        <input id="searchInput" type="text" class="form-control" placeholder="Nombre, correo...">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label fw-bold">Filtrar por discapacidad</label>
                        <select id="filtroDiscapacidad" class="form-select">
                            <option value="all">Todas</option>
                            <option value="fisica">Física / Motora</option>
                            <option value="visual">Visual</option>
                            <option value="auditiva">Auditiva</option>
                            <option value="intelectual">Intelectual</option>
                            <option value="psicosocial">Psicosocial</option>
                        </select>
                    </div>

                    <div class="col-md-2 d-flex align-items-end">
                        <button id="filterBtn" class="btn btn-primary w-100"><i class="fa fa-filter"></i> Filtrar</button>
                    </div>

                    <div class="col-md-2 d-flex align-items-end">
                        <button id="clearBtn" class="btn btn-outline-secondary w-100">Limpiar</button>
                    </div>

                </div>

                <!-- TABLA -->
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                            <tr>
                                <th>Nombre</th>
                                <th>Correo</th>
                                <th>Discapacidad</th>
                                <th>Fecha Registro</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="tablaUsuarios">
                            <!-- Se llena desde usuarios_admin.js -->
                        </tbody>
                    </table>
                </div>

            </div>

        </div>

    </div>

    <!-- MODAL EDITAR -->
    <div class="modal fade" id="modalEditar" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content rounded-4">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title">Editar Usuario</h5>
                    <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <label class="form-label">Nombre</label>
                    <input id="editNombre" class="form-control mb-3">

                    <label class="form-label">Correo</label>
                    <input id="editCorreo" class="form-control mb-3">

                    <label class="form-label">Discapacidad</label>
                    <select id="editDiscapacidad" class="form-select">
                        <option value="fisica">Física / Motora</option>
                        <option value="visual">Visual</option>
                        <option value="auditiva">Auditiva</option>
                        <option value="intelectual">Intelectual</option>
                        <option value="psicosocial">Psicosocial</option>
                    </select>
                </div>

                <div class="modal-footer">
                    <button id="guardarCambios" class="btn btn-success">Guardar cambios</button>
                </div>

            </div>
        </div>
    </div>

        <!-- MODAL AGREGAR USUARIO -->
        <div class="modal fade" id="modalAgregar" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content rounded-4">
                    <div class="modal-header bg-success text-white">
                        <h5 class="modal-title">Agregar Nuevo Usuario</h5>
                        <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                    </div>

                    <div class="modal-body">
                        <label class="form-label">Nombre</label>
                        <input id="nuevoNombre" class="form-control mb-3" placeholder="Nombre completo">

                        <label class="form-label">Correo</label>
                        <input id="nuevoCorreo" type="email" class="form-control mb-3" placeholder="Correo electrónico">

                        <label class="form-label">Contraseña</label>
                        <input id="nuevoPassword" type="password" class="form-control mb-3" placeholder="Contraseña">

                        <label class="form-label">Discapacidad</label>
                        <select id="nuevoDiscapacidad" class="form-select">
                            <option value="">Seleccionar</option>
                            <option value="fisica">Física / Motora</option>
                            <option value="visual">Visual</option>
                            <option value="auditiva">Auditiva</option>
                            <option value="intelectual">Intelectual</option>
                            <option value="psicosocial">Psicosocial</option>
                        </select>
                    </div>

                    <div class="modal-footer">
                        <button id="guardarNuevoUsuario" class="btn btn-success">Guardar Usuario</button>
                    </div>
                </div>
            </div>
        </div>


    <!-- SCRIPTS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../init_data.js"></script>
    <script src="../BD/data.js"></script>
    <script src="../BD/auth.js"></script>
    <script src="usuario.js"></script>

</body>
</html>
