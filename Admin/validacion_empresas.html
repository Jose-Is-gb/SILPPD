<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validación de Empresas - Talento Inclusivo</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- CSS propio -->
    <link rel="stylesheet" href="validacion_empresas.css">
</head>

<body>

    <div class="d-flex">

        <!-- SIDEBAR -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h3>Admin</h3>
                <p class="text-muted small">Talento Inclusivo</p>
            </div>

            <ul class="sidebar-menu">
                <li onclick="location.href='admin.html'"><i class="fa fa-chart-line"></i> Dashboard</li>
                <li onclick="location.href='usuario.html'"><i class="fa fa-users"></i> Usuarios</li>
                <li onclick="location.href='gestion.html'"><i class="fa fa-briefcase"></i> Ofertas</li>
                <li class="active"><i class="fa fa-building"></i> Empresas</li>
                <li onclick="location.href='reporte.html'"><i class="fa fa-chart-pie"></i> Reportes</li>
                <li onclick="location.href='config_admin.html'"><i class="fa fa-gear"></i> Configuración</li>
                <li id="logoutBtn" class="logout"><i class="fa fa-right-from-bracket"></i> Salir</li>
            </ul>
        </div>

        <!-- CONTENIDO PRINCIPAL -->
        <div class="main-content">

            <!-- TOPBAR -->
            <nav class="navbar navbar-expand-lg bg-white shadow-sm px-4">
                <div class="container-fluid">
                    <span class="navbar-brand fw-bold text-primary">Validación de Empresas</span>

                    <div class="ms-auto d-flex align-items-center">
                        <span class="me-3 fw-semibold">Administrador</span>
                        <i class="fa fa-user-circle fa-2x text-primary"></i>
                    </div>
                </div>
            </nav>

            <div class="container-fluid mt-4">

                <div class="card p-4 shadow rounded-3">

                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h5 class="fw-bold">Empresas Registradas</h5>
                    </div>

                    <!-- FILTROS -->
                    <div class="row g-3 mb-4">

                        <div class="col-md-4">
                            <label class="form-label fw-bold">Sector</label>
                            <select id="filtrarSector" class="form-select">
                                <option value="all">Todos</option>
                                <option value="Tecnología">Tecnología</option>
                                <option value="Diseño y Marketing">Diseño y Marketing</option>
                                <option value="Finanzas">Finanzas</option>
                                <option value="Educación">Educación</option>
                                <option value="Comercio">Comercio</option>
                            </select>
                        </div>

                        <div class="col-md-4">
                            <label class="form-label fw-bold">Región</label>
                            <select id="filtrarRegion" class="form-select">
                                <option value="all">Todas</option>
                                <option value="Lima">Lima</option>
                                <option value="Arequipa">Arequipa</option>
                                <option value="Cuzco">Cuzco</option>
                                <option value="Trujillo">Trujillo</option>
                            </select>
                        </div>

                        <div class="col-md-2 d-flex align-items-end">
                            <button id="btnFiltrar" class="btn btn-primary w-100"><i class="fa fa-filter"></i> Filtrar</button>
                        </div>

                        <div class="col-md-2 d-flex align-items-end">
                            <button id="btnLimpiar" class="btn btn-outline-secondary w-100">Limpiar</button>
                        </div>

                    </div>

                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>Empresa</th>
                                    <th>Sector</th>
                                    <th>Región</th>
                                    <th>Estado</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="empresasContainer">
                                <!-- JS render -->
                            </tbody>
                        </table>
                    </div>


                </div>

            </div>

        </div>

    </div>

    <!-- MODAL -->
    <div class="modal fade" id="modalEmpresa" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content rounded-4">

                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title" id="modalEmpresaTitulo">Información de Empresa</h5>
                    <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body" id="modalEmpresaContenido"></div>

                <div class="modal-footer">
                    <button id="btnAprobarModal" class="btn btn-success">Aprobar</button>
                    <button id="btnRechazarModal" class="btn btn-danger">Rechazar</button>
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
                </div>

            </div>
        </div>
    </div>


    <!-- JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../init_data.js"></script>
    <script src="../BD/data.js"></script>
    <script src="../BD/auth.js"></script>
    <script src="validacion_empresas.js"></script>

</body>
</html>
