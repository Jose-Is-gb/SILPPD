    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-2">
            <div>
                <h2 class="fw-bold mb-1">Gestión de Ofertas</h2>
                <p class="text-secondary">Administra todas tus ofertas laborales publicadas.</p>
            </div>
            <a href="publicar_oferta.html" class="btn btn-orange rounded-3 px-4 py-2 fw-bold">
                <i class="fa fa-plus me-2"></i> Nueva oferta
            </a>
        </div>

        <!-- FILTERS -->
        <div class="card border-0 shadow-sm rounded-4 p-3 mb-4">
            <div class="row g-3">
                <!-- Columna del sistema de rejilla Bootstrap -->
                <div class="col-md-6">
                    <div class="input-group">
                        <span class="input-group-text bg-white border-0 ps-3">
                            <i class="fa fa-search text-muted"></i>
                        </span>
                        <!-- Campo de entrada de datos de usuario -->
                        <input type="text" id="searchOffer" class="form-control border-0 py-2" placeholder="Buscar por título de oferta...">
                    </div>
                </div>
                <!-- Columna del sistema de rejilla Bootstrap -->
                <div class="col-md-3">
                    <select id="filterEstado" class="form-select border-0 bg-light py-2 px-3 rounded-3">
                        <option value="">Estado</option>
                        <option value="Activa">Activa</option>
                        <option value="Pausada">Pausada</option>
                    </select>
                </div>
                <!-- Columna del sistema de rejilla Bootstrap -->
                <div class="col-md-3">
                    <select id="filterModalidad" class="form-select border-0 bg-light py-2 px-3 rounded-3">
                        <option value="">Modalidad</option>
                        <option value="Presencial">Presencial</option>
                        <option value="Remoto">Remoto</option>
                        <option value="Híbrido">Híbrido</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- OFFERS LIST -->
        <div id="offersList" class="row g-3">
            <!-- Cargado dinámicamente -->
        </div>
    </div>

    <!-- MODAL DETALLES -->
    <div class="modal fade" id="modalDetalle" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 rounded-4 shadow">
                <div class="modal-header border-0 pb-0 px-4 pt-4">
                    <h5 class="modal-title fw-bold">Detalles de la Oferta</h5>
                    <!-- Botón de acción interactivo -->
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4" id="modalDetalleBody">
                    <!-- Contenido dinámico -->
                </div>
                <div class="modal-footer border-0 px-4 pb-4">
                    <!-- Botón de acción interactivo -->
                    <button type="button" class="btn btn-light rounded-pill px-4 fw-bold" data-bs-dismiss="modal">Cerrar</button>
                </div>
            </div>
        </div>
    </div>
