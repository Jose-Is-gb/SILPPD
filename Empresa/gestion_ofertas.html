<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Ofertas - Talento Inclusivo</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="dashboard.css">
</head>
<body class="bg-light">

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-white py-3 border-bottom sticky-top">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold d-flex align-items-center" href="dashboard.html">
                <span style="color: #ff9800;"><i class="fa fa-wheelchair me-2"></i> Talento Inclusivo</span>
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div id="menu" class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item mx-2"><a class="nav-link text-secondary" href="dashboard.html">Inicio</a></li>
                    <li class="nav-item mx-2"><a class="nav-link active text-dark fw-semibold" href="gestion_ofertas.html">Mis Ofertas</a></li>
                    <li class="nav-item mx-2"><a class="nav-link text-secondary" href="postulaciones_recibidas.html">Postulaciones</a></li>
                    <li class="nav-item mx-2"><a class="nav-link text-secondary" href="mensajeria.html">Mensajes</a></li>
                    <li class="nav-item mx-2"><a class="nav-link text-secondary" href="perfil.html">Perfil</a></li>
                    <li class="nav-item ms-lg-3">
                        <a class="nav-link text-danger fw-bold" href="#" id="logoutBtn" onclick="Auth.logout()">Cerrar sesión</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-2">
            <div>
                <h2 class="fw-bold mb-1">Gestión de Ofertas</h2>
                <p class="text-secondary">Administra todas tus ofertas laborales publicadas.</p>
            </div>
            <a href="publicar_oferta.html" class="btn btn-orange rounded-3 px-4 py-2 fw-bold">
                <i class="fa fa-plus me-2"></i> Nueva oferta
            </a>
        </div>

        <!-- FILTERS -->
        <div class="card border-0 shadow-sm rounded-4 p-3 mb-4">
            <div class="row g-3">
                <div class="col-md-6">
                    <div class="input-group">
                        <span class="input-group-text bg-white border-0 ps-3">
                            <i class="fa fa-search text-muted"></i>
                        </span>
                        <input type="text" id="searchOffer" class="form-control border-0 py-2" placeholder="Buscar por título de oferta...">
                    </div>
                </div>
                <div class="col-md-3">
                    <select id="filterEstado" class="form-select border-0 bg-light py-2 px-3 rounded-3">
                        <option value="">Estado</option>
                        <option value="Activa">Activa</option>
                        <option value="Pausada">Pausada</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <select id="filterModalidad" class="form-select border-0 bg-light py-2 px-3 rounded-3">
                        <option value="">Modalidad</option>
                        <option value="Presencial">Presencial</option>
                        <option value="Remoto">Remoto</option>
                        <option value="Híbrido">Híbrido</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- OFFERS LIST -->
        <div id="offersList" class="row g-3">
            <!-- Cargado dinámicamente -->
        </div>
    </div>

    <!-- MODAL DETALLES -->
    <div class="modal fade" id="modalDetalle" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 rounded-4 shadow">
                <div class="modal-header border-0 pb-0 px-4 pt-4">
                    <h5 class="modal-title fw-bold">Detalles de la Oferta</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4" id="modalDetalleBody">
                    <!-- Contenido dinámico -->
                </div>
                <div class="modal-footer border-0 px-4 pb-4">
                    <button type="button" class="btn btn-light rounded-pill px-4 fw-bold" data-bs-dismiss="modal">Cerrar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- SCRIPTS DE FIREBASE (Modo Compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="../BD/firebase-config.js"></script>

    <script src="../BD/auth.js"></script>
    <script src="../BD/data.js"></script>
    <script src="gestion_ofertas.js"></script>
</body>
</html>
