                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="mb-4">
            <h2 class="fw-bold mb-1">Postulaciones Recibidas</h2>
            <p class="text-secondary">Gestiona las postulaciones de candidatos a tus ofertas.</p>
        </div>

        <!-- SEARCH & FILTERS -->
        <div class="card border-0 shadow-sm rounded-4 p-3 mb-4">
            <div class="row g-3">
                <!-- Columna del sistema de rejilla Bootstrap -->
                <div class="col-md-6">
                    <div class="input-group">
                        <span class="input-group-text bg-white border-0 ps-3">
                            <i class="fa fa-search text-muted"></i>
                        </span>
                        <!-- Campo de entrada de datos de usuario -->
                        <input type="text" id="searchCandidate" class="form-control border-0 py-2" placeholder="Buscar por nombre de candidato...">
                    </div>
                </div>
                <!-- Columna del sistema de rejilla Bootstrap -->
                <div class="col-md-3">
                    <select id="filterOffer" class="form-select border-0 bg-light py-2 px-3 rounded-3">
                        <option value="">Oferta laboral</option>
                        <!-- Cargado dinámicamente -->
                    </select>
                </div>
                <!-- Columna del sistema de rejilla Bootstrap -->
                <div class="col-md-3">
                    <select id="filterEstado" class="form-select border-0 bg-light py-2 px-3 rounded-3">
                        <option value="">Estado</option>
                        <option value="Pendiente">Pendiente</option>
                        <option value="En revisión">En revisión</option>
                        <option value="Aceptado">Aceptado</option>
                        <option value="Rechazado">Rechazado</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- TABS -->
        <ul class="nav nav-pills bg-white p-1 rounded-4 shadow-sm mb-4" id="postulacionesTabs" role="tablist">
            <li class="nav-item flex-fill" role="presentation">
                <!-- Botón de acción interactivo -->
                <button class="nav-link active w-100 rounded-pill" data-status="Nuevas" data-bs-toggle="pill" type="button">Nuevas (<span id="countNew">0</span>)</button>
            </li>
            <li class="nav-item flex-fill" role="presentation">
                <!-- Botón de acción interactivo -->
                <button class="nav-link w-100 rounded-pill" data-status="En revisión" data-bs-toggle="pill" type="button">Revisadas (<span id="countReviewed">0</span>)</button>
            </li>
            <li class="nav-item flex-fill" role="presentation">
                <!-- Botón de acción interactivo -->
                <button class="nav-link w-100 rounded-pill" data-status="Aceptado" data-bs-toggle="pill" type="button">Aceptadas (<span id="countAccepted">0</span>)</button>
            </li>
            <li class="nav-item flex-fill" role="presentation">
                <!-- Botón de acción interactivo -->
                <button class="nav-link w-100 rounded-pill" data-status="Rechazado" data-bs-toggle="pill" type="button">Rechazadas (<span id="countRejected">0</span>)</button>
            </li>
        </ul>

        <!-- CANDIDATES LIST -->
        <div id="candidatesList" class="row g-3">
            <!-- Cargado dinámicamente -->
        </div>
    </div>

    <!-- MODAL CV -->
    <div class="modal fade" id="modalCV" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content border-0 rounded-4 shadow">
                <div class="modal-header border-0 pb-0 px-4 pt-4">
                    <h5 class="modal-title fw-bold" id="cvModalTitle">Curriculum Vitae</h5>
                    <!-- Botón de acción interactivo -->
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <div id="cvContainer" class="bg-light rounded-4 p-4 text-center" style="min-height: 400px; border: 2px dashed #ccc;">
                        <!-- Contenido dinámico -->
                        <i class="fa fa-file-pdf text-danger mb-3" style="font-size: 4rem;"></i>
                        <h4 class="fw-bold">Visualización de CV</h4>
                        <p class="text-secondary">Simulación de documento PDF para testing.</p>
                    </div>
                </div>
                <div class="modal-footer border-0 px-4 pb-4">
                    <!-- Botón de acción interactivo -->
                    <button type="button" class="btn btn-light rounded-pill px-4 fw-bold" data-bs-dismiss="modal">Cerrar</button>
                    <button type="button" class="btn btn-orange text-white rounded-pill px-4 fw-bold shadow-sm" onclick="alert('Funcionalidad de descarga en curso...')">Descargar PDF</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

    <script src="../BD/firebase-config.js"></script>

    <script src="../BD/auth.js"></script>
    <script src="../BD/data.js"></script>

  <script src="../utils/accessibility.js" defer></script>
</body>
</html>
