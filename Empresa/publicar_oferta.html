<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Publicar Oferta - Talento Inclusivo</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="dashboard.css">
</head>
<body class="bg-light">

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-white py-3 border-bottom sticky-top">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold d-flex align-items-center" href="dashboard.html">
                <span style="color: #ff9800;"><i class="fa fa-wheelchair me-2"></i> Talento Inclusivo</span>
            </a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item mx-2"><a class="nav-link text-secondary" href="dashboard.html">Inicio</a></li>
                    <li class="nav-item mx-2"><a class="nav-link active text-dark fw-semibold" href="gestion_ofertas.html">Mis Ofertas</a></li>
                    <li class="nav-item mx-2"><a class="nav-link text-secondary" href="mensajeria.html">Mensajes</a></li>
                    <li class="nav-item mx-2"><a class="nav-link text-secondary" href="perfil.html">Perfil</a></li>
                    <li class="nav-item ms-lg-3">
                        <a class="nav-link text-danger fw-bold" href="#" id="logoutBtn" onclick="Auth.logout()">Cerrar sesión</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="mb-4">
            <h2 class="fw-bold mb-1">Publicar Nueva Oferta</h2>
            <p class="text-secondary">Completa la información de tu oferta laboral.</p>
        </div>

        <div class="card border-0 shadow-sm rounded-4 p-4 p-md-5">
            <form id="offerForm">
                <!-- SECCIÓN 1: INFORMACIÓN BÁSICA -->
                <div class="mb-5">
                    <h5 class="fw-bold mb-4 d-flex align-items-center">
                        <span class="badge bg-orange-light text-orange rounded-pill me-2 px-3 py-2" style="font-size: 0.8rem;">1</span>
                        Información básica
                    </h5>
                    <div class="row g-4">
                        <div class="col-md-12">
                            <label class="form-label small fw-bold">Título del puesto *</label>
                            <input type="text" id="titulo" class="form-control bg-light border-0 py-2" placeholder="Ej: Desarrollador Frontend Senior" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold">Categoría *</label>
                            <select id="categoria" class="form-select bg-light border-0 py-2" required>
                                <option value="">Seleccionar categoría</option>
                                <option value="Tecnología">Tecnología</option>
                                <option value="Administración">Administración</option>
                                <option value="Marketing">Marketing</option>
                                <option value="Diseño">Diseño</option>
                                <option value="Operaciones">Operaciones</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold">Número de vacantes *</label>
                            <input type="number" id="vacantes" class="form-control bg-light border-0 py-2" placeholder="Ej: 1" min="1" required>
                        </div>
                        <div class="col-12">
                            <label class="form-label small fw-bold">Descripción del puesto *</label>
                            <textarea id="descripcion" class="form-control bg-light border-0 py-2" rows="4" placeholder="Describe las responsabilidades y funciones del puesto..." required></textarea>
                        </div>
                        <div class="col-12">
                            <label class="form-label small fw-bold">Requisitos *</label>
                            <textarea id="requisitos" class="form-control bg-light border-0 py-2" rows="3" placeholder="Lista los requisitos necesarios para el puesto..." required></textarea>
                        </div>
                    </div>
                </div>

                <hr class="my-5 opacity-25">

                <!-- SECCIÓN 2: DETALLES DEL TRABAJO -->
                <div class="mb-5">
                    <h5 class="fw-bold mb-4 d-flex align-items-center">
                        <span class="badge bg-orange-light text-orange rounded-pill me-2 px-3 py-2" style="font-size: 0.8rem;">2</span>
                        Detalles del trabajo
                    </h5>
                    <div class="row g-4">
                        <div class="col-md-6">
                            <label class="form-label small fw-bold">Modalidad *</label>
                            <select id="modalidad" class="form-select bg-light border-0 py-2" required>
                                <option value="">Seleccionar modalidad</option>
                                <option value="Presencial">Presencial</option>
                                <option value="Remoto">Remoto</option>
                                <option value="Híbrido">Híbrido</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold">Jornada laboral *</label>
                            <select id="jornada" class="form-select bg-light border-0 py-2" required>
                                <option value="">Seleccionar jornada</option>
                                <option value="Tiempo completo">Tiempo completo</option>
                                <option value="Medio tiempo">Medio tiempo</option>
                                <option value="Por proyecto">Por proyecto</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold">Salario mínimo</label>
                            <input type="number" id="salarioMin" class="form-control bg-light border-0 py-2" placeholder="Ej: 3000">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold">Salario máximo</label>
                            <input type="number" id="salarioMax" class="form-control bg-light border-0 py-2" placeholder="Ej: 5000">
                        </div>
                        <div class="col-12">
                            <label class="form-label small fw-bold">Ubicación</label>
                            <input type="text" id="ubicacion" class="form-control bg-light border-0 py-2" placeholder="Ej: Madrid, España">
                        </div>
                    </div>
                </div>

                <hr class="my-5 opacity-25">

                <!-- SECCIÓN 3: ADAPTACIONES -->
                <div class="mb-5">
                    <h5 class="fw-bold mb-4 d-flex align-items-center">
                        <span class="badge bg-orange-light text-orange rounded-pill me-2 px-3 py-2" style="font-size: 0.8rem;">3</span>
                        Adaptaciones de accesibilidad
                    </h5>
                    <div class="col-12">
                        <label class="form-label small fw-bold">Describe las adaptaciones disponibles</label>
                        <textarea id="adaptaciones" class="form-control bg-light border-0 py-2" rows="3" placeholder="Ej: Entorno accesible para sillas de ruedas, tecnología de asistencia disponible, horarios flexibles..."></textarea>
                    </div>
                </div>

                <hr class="my-5 opacity-25">

                <!-- SECCIÓN 4: VIGENCIA -->
                <div class="mb-5">
                    <h5 class="fw-bold mb-4 d-flex align-items-center">
                        <span class="badge bg-orange-light text-orange rounded-pill me-2 px-3 py-2" style="font-size: 0.8rem;">4</span>
                        Vigencia de la oferta
                    </h5>
                    <div class="col-md-6">
                        <label class="form-label small fw-bold">Fecha de vencimiento *</label>
                        <input type="date" id="vencimiento" class="form-control bg-light border-0 py-2" required>
                    </div>
                </div>

                <!-- FOOTER ACTIONS -->
                <div class="d-flex flex-wrap gap-3 mt-5 pt-4 border-top">
                    <button type="submit" class="btn btn-orange rounded-3 px-5 py-2 fw-bold shadow-sm">
                        Publicar oferta
                    </button>
                    <button type="button" class="btn btn-light rounded-3 px-4 py-2 text-dark font-medium border">
                        Guardar como borrador
                    </button>
                    <a href="gestion_ofertas.html" class="btn btn-link text-secondary text-decoration-none py-2">
                        <i class="fa fa-times me-1"></i> Cancelar
                    </a>
                </div>
            </form>
        </div>
    </div>

    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- SCRIPTS DE FIREBASE (Modo Compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="../BD/firebase-config.js"></script>

    <script src="../BD/auth.js"></script>
    <script src="../BD/data.js"></script>
    <script src="publicar_oferta.js"></script>
</body>
</html>
