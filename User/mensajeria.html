<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mensajería - Talento Inclusivo</title>

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Estilos -->
    <link rel="stylesheet" href="mensajeria.css">

</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary px-4">
        <a class="navbar-brand fw-bold" href="user_home.html">Talento Inclusivo</a>

        <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div id="menu" class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="user_home.html"><i class="fa fa-wheelchair"></i> Inicio</a></li>
                <li class="nav-item"><a class="nav-link" href="perfil.html"><i class="fa fa-user"></i> Perfil</a></li>
                <li class="nav-item"><a class="nav-link active" href="mensajeria.html"><i class="fa fa-envelope"></i> Mensajes</a></li>
                <li class="nav-item"><a class="nav-link" href="validacion_ofertas.html"><i class="fa fa-briefcase"></i> Ofertas</a></li>
                <li class="nav-item"><a class="nav-link" href="seguimiento.html"><i class="fa fa-list"></i> Seguimiento</a></li>
                <li class="nav-item"><a class="nav-link" href="#" id="logoutBtn"><i class="fa fa-right-from-bracket"></i> Salir</a></li>
            </ul>
        </div>
    </nav>

    <!-- CONTENEDOR PRINCIPAL -->
    <div class="container py-4">

        <h3 class="fw-bold text-primary mb-4">Mensajería</h3>

        <div class="row g-4">

            <!-- LISTA DE CONVERSACIONES -->
            <div class="col-lg-4">
                <div class="card shadow-sm chat-list">
                    <div class="card-header bg-primary text-white fw-bold">
                        Conversaciones
                    </div>

                    <ul class="list-group list-group-flush" id="chatList">
                        <!-- Conversaciones creadas por JS -->
                    </ul>
                </div>
            </div>

            <!-- VENTANA DEL CHAT -->
            <div class="col-lg-8">
                <div class="card shadow-sm chat-window">

                    <div class="card-header bg-white border-bottom fw-bold" id="chatHeader">
                        Selecciona una conversación
                    </div>

                    <div class="card-body chat-body" id="chatBody"></div>

                    <div class="card-footer p-2">
                        <div class="input-group">
                            <input type="text" id="messageInput" placeholder="Escribe un mensaje..." class="form-control">
                            <button class="btn btn-primary" id="sendBtn">
                                <i class="fa-solid fa-paper-plane"></i>
                            </button>
                        </div>
                    </div>

                </div>
            </div>

        </div>
    </div>

    <footer class="text-center py-3 text-muted">
        © 2025 Talento Inclusivo.
    </footer>

    <!-- JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../init_data.js"></script>
    <script src="../BD/auth.js"></script>
    <script src="../BD/data.js"></script>
    <script src="mensajeria.js"></script>

</body>
</html>
