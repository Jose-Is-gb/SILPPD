<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil - Talento Inclusivo</title>

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

    <!-- Iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Estilos -->
    <link rel="stylesheet" href="perfil.css">
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary px-4">
        <a class="navbar-brand fw-bold" href="user_home.html">Talento Inclusivo</a>

        <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div id="menu" class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="user_home.html"><i class="fa fa-wheelchair"></i> Inicio</a></li>
                <li class="nav-item"><a class="nav-link active" href="perfil.html"><i class="fa fa-user"></i> Perfil</a></li>
                <li class="nav-item"><a class="nav-link" href="mensajeria.html"><i class="fa fa-envelope"></i> Mensajes</a></li>
                <li class="nav-item"><a class="nav-link" href="validacion_ofertas.html"><i class="fa fa-briefcase"></i> Ofertas</a></li>
                <li class="nav-item"><a class="nav-link" href="seguimiento.html"><i class="fa fa-list"></i> Seguimiento</a></li>
                <li class="nav-item"><a class="nav-link" href="#" id="logoutBtn"><i class="fa fa-right-from-bracket"></i> Salir</a></li>
            </ul>
        </div>
    </nav>

    <!-- CONTENIDO PRINCIPAL -->
    <div class="container py-5">

        <h2 class="fw-bold text-primary mb-4">Mi Perfil</h2>

        <div class="row g-4">

            <!-- TARJETA DE PERFIL -->
            <div class="col-lg-4">
                <div class="card shadow-lg text-center p-4 card-profile">
                    <div class="profile-img-container">
                        <img id="profilePhoto" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" class="profile-img">
                    </div>

                    <h4 class="fw-bold mt-3" id="profileName">Usuario</h4>
                    <p class="text-muted" id="profileEmail"></p>

                    <label class="btn btn-outline-primary mt-2">
                        <i class="fa fa-image"></i> Cambiar foto
                        <input type="file" id="photoInput" hidden>
                    </label>
                </div>
            </div>

            <!-- FORMULARIO -->
            <div class="col-lg-8">
                <div class="card shadow-lg p-4 rounded-4">

                    <h5 class="fw-bold text-primary mb-3">Datos Personales</h5>

                    <form id="profileForm" class="row g-3">

                        <div class="col-md-6">
                            <label class="form-label">Nombre</label>
                            <input type="text" class="form-control" id="nombre">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Apellido</label>
                            <input type="text" class="form-control" id="apellido">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Correo Electrónico</label>
                            <input type="email" class="form-control" id="correo" disabled>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Teléfono</label>
                            <input type="text" class="form-control" id="telefono">
                        </div>

                        <div class="col-md-12">
                            <label class="form-label">Descripción</label>
                            <textarea class="form-control" rows="3" id="descripcion"></textarea>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-bold">Tipo de discapacidad</label>
                            <select id="discapacidad" class="form-select">
                                <option value="">Seleccione...</option>
                                <option value="Visual">Visual</option>
                                <option value="Auditiva">Auditiva</option>
                                <option value="Motora">Motora</option>
                                <option value="Intelectual">Intelectual</option>
                                <option value="Psicosocial">Psicosocial</option>
                            </select>
                        </div>

                        <div class="col-12">
                            <button class="btn btn-primary px-4" id="saveBtn" type="submit">Guardar Cambios</button>
                        </div>

                    </form>
                </div>
            </div>

        </div>

        <!-- ALERTA -->
        <div id="saveAlert" class="alert alert-success text-center mt-4 d-none">
            Cambios guardados correctamente.
        </div>

    </div>

    <footer class="text-center py-3 text-muted">
        © 2025 Talento Inclusivo.
    </footer>

    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- JS -->
    <script src="../init_data.js"></script>
    <script src="../BD/auth.js"></script>
    <script src="../BD/data.js"></script>
    <script src="perfil.js"></script>

</body>
</html>
