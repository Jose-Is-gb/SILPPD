<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seguimiento de Postulaciones - Talento Inclusivo</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="stylesheet" href="seguimiento.css">
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary px-4">
        <a class="navbar-brand fw-bold" href="user_home.html">Talento Inclusivo</a>

        <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div id="menu" class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="user_home.html"><i class="fa fa-wheelchair"></i> Inicio</a></li>
                <li class="nav-item"><a class="nav-link" href="perfil.html"><i class="fa fa-user"></i> Perfil</a></li>
                <li class="nav-item"><a class="nav-link" href="mensajeria.html"><i class="fa fa-envelope"></i> Mensajes</a></li>
                <li class="nav-item"><a class="nav-link" href="validacion_ofertas.html"><i class="fa fa-briefcase"></i> Ofertas</a></li>
                <li class="nav-item"><a class="nav-link active" href="seguimiento.html"><i class="fa fa-list"></i> Seguimiento</a></li>
                <li class="nav-item"><a class="nav-link" href="#" id="logoutBtn"><i class="fa fa-right-from-bracket"></i> Salir</a></li>
            </ul>
        </div>
    </nav>

    <!-- CONTENIDO PRINCIPAL -->
    <div class="container py-5">

        <h2 class="fw-bold text-primary mb-4">Seguimiento de Postulaciones</h2>

        <!-- Tarjetas de estado -->
        <div class="row g-4 mb-4">

            <div class="col-md-3">
                <div class="card shadow-sm status-card">
                    <div class="card-body text-center">
                        <i class="fa-solid fa-clock status-icon text-warning"></i>
                        <h5 class="fw-bold mt-2">Pendientes</h5>
                        <p id="countPendientes" class="count-number">0</p>
                    </div>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card shadow-sm status-card">
                    <div class="card-body text-center">
                        <i class="fa-solid fa-spinner status-icon text-primary"></i>
                        <h5 class="fw-bold mt-2">En revisión</h5>
                        <p id="countRevision" class="count-number">0</p>
                    </div>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card shadow-sm status-card">
                    <div class="card-body text-center">
                        <i class="fa-solid fa-check status-icon text-success"></i>
                        <h5 class="fw-bold mt-2">Aceptadas</h5>
                        <p id="countAceptadas" class="count-number">0</p>
                    </div>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card shadow-sm status-card">
                    <div class="card-body text-center">
                        <i class="fa-solid fa-x status-icon text-danger"></i>
                        <h5 class="fw-bold mt-2">Rechazadas</h5>
                        <p id="countRechazadas" class="count-number">0</p>
                    </div>
                </div>
            </div>

        </div>

        <!-- TABLA DE POSTULACIONES -->
        <div class="card shadow-lg p-4 rounded-4">
            <h5 class="fw-bold mb-3">Historial</h5>

            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>Puesto</th>
                            <th>Empresa</th>
                            <th>Fecha</th>
                            <th>Estado</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <!-- JS genera las filas -->
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <footer class="text-center py-3 text-muted">
        © 2025 Talento Inclusivo.
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../init_data.js"></script>
    <script src="../BD/auth.js"></script>
    <script src="../BD/data.js"></script>
    <script src="seguimiento.js"></script>

</body>
</html>
