<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ofertas de Empleo - Talento Inclusivo</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="stylesheet" href="validacion_ofertas.css">
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary px-4">
        <a class="navbar-brand fw-bold" href="user_home.html">Talento Inclusivo</a>

        <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div id="menu" class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="user_home.html"><i class="fa fa-wheelchair"></i> Inicio</a></li>
                <li class="nav-item"><a class="nav-link" href="perfil.html"><i class="fa fa-user"></i> Perfil</a></li>
                <li class="nav-item"><a class="nav-link" href="mensajeria.html"><i class="fa fa-envelope"></i> Mensajes</a></li>
                <li class="nav-item"><a class="nav-link active" href="#"><i class="fa fa-briefcase"></i> Ofertas</a></li>
                <li class="nav-item"><a class="nav-link" href="seguimiento.html"><i class="fa fa-list"></i> Seguimiento</a></li>
                <li class="nav-item"><a class="nav-link" href="#" id="logoutBtn"><i class="fa fa-right-from-bracket"></i> Salir</a></li>
            </ul>
        </div>
    </nav>

    <!-- CONTENIDO -->
    <div class="container py-5">

        <h2 class="fw-bold text-primary mb-4">Ofertas de Empleo</h2>

        <!-- Filtros -->
        <div class="card shadow-sm p-4 rounded-4 mb-4">
            <div class="row g-3">

                <div class="row g-3">

                    <div class="col-md-4">
                      <label class="form-label fw-bold">Buscar por palabra clave</label>
                        <input type="text" id="searchInput" class="form-control" placeholder="Ejemplo: Diseño, Soporte, Ventas...">
                    </div>

                    <div class="col-md-3">
                      <label class="form-label fw-bold">Categoría</label>
                        <select id="categorySelect" class="form-select">
                            <option value="all">Todas</option>
                            <option value="Diseño">Diseño</option>
                            <option value="Tecnología">Tecnología</option>
                            <option value="Administración">Administración</option>
                            <option value="Marketing">Marketing</option>
                            <option value="Operaciones">Operaciones</option>
                            <option value="Contabilidad">Contabilidad</option>
                            <option value="Ventas">Ventas</option>

                        </select>
                    </div>

                    <div class="col-md-3">
                      <label class="form-label fw-bold">Discapacidad compatible</label>
                        <select id="discapacidadSelect" class="form-select">
                            <option value="all">Todas</option>
                            <option value="Visual">Visual</option>
                            <option value="Auditiva">Auditiva</option>
                            <option value="Fisica">Física / Motora</option>
                            <option value="Intelectual">Intelectual</option>
                            <option value="Psicosocial">Psicosocial</option>
                        </select>
                    </div>

                    <div class="col-md-2 d-flex align-items-end">
                      <button class="btn btn-primary w-100" id="filterBtn">
                        <i class="fa fa-filter"></i> Filtrar
                      </button>
                    </div>

            </div>


            </div>
        </div>

        <!-- LISTADO DE OFERTAS -->
          <div class="row g-4" id="offersContainer">
            <!-- Se llena con JS -->
        </div>

    </div>

    <!-- MODAL: DETALLES DE OFERTA -->
    <div class="modal fade" id="offerModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content rounded-4">

                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title" id="modalTitle">Título de la oferta</h5>
                    <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <p class="text-muted" id="modalCategory"></p>
                    <p id="modalDescription"></p>
                    <p><strong>Empresa:</strong> <span id="modalCompany"></span></p>
                    <p><strong>Fecha de Publicación:</strong> <span id="modalDate"></span></p>
                    <p><strong>Discapacidad compatible:</strong> <span id="modalDiscapacidad"></span></p>
                </div>

                <div class="modal-footer">
                    <button id="postularBtn" class="btn btn-primary">
                        <i class="fa fa-check"></i> Postular
                    </button>
                </div>

            </div>
        </div>
    </div>

    <footer class="text-center py-3 text-muted">
        © 2025 Talento Inclusivo.
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../init_data.js"></script>
    <script src="../BD/auth.js"></script>
    <script src="../BD/data.js"></script>
    <script src="validacion_ofertas.js"></script>

</body>
</html>
